services:
  db:
    ports:
      - "5432:5432"

  api:
    ports:
      - "8000:8000"
    environment: 
      API_BUILD: "paper-20260118-1"

  frontend:
    ports:
      - "3000:80"

  bot-runner:
    build:
      context: .
      dockerfile: services/bot_runner/Dockerfile
    env_file:
      - ${ENV_FILE}
    environment:
      BOT_RUNNER_POLL_SECONDS: 5
      BOT_RUNNER_GRACE_SECONDS: 20
      BOT_RUNNER_RESTART_BACKOFF_SECONDS: 15
      BOT_VERSION: 2026-01-24d
    depends_on:
      - db
    restart: unless-stopped

  automation-runner:
    env_file:
      - .env.paper

  bot-runner-orchestrator:
    build:
      context: .
      dockerfile: services/bot_runner_orchestrator/Dockerfile
    env_file:
      - ${ENV_FILE}
    environment:
      ORC_POLL_SECONDS: 10
      ORC_ACTIONS_ENABLED: ${ORC_ACTIONS_ENABLED:-false}
      BOT_VERSION: 2026-02-05_a__paper
    depends_on:
      - db
    restart: unless-stopped
  
  regime-worker:
    environment:
      BOT_VERSION: 2026-01-26a