services:
  db:
    ports: []

  api:
    ports: []
    environment:
      API_BUILD: "paper-20260118-1"
    networks:
      default:
      trading-edge:
        aliases:
          - paper-api

  frontend:
    profiles: ["legacy-paper-ui"]
    ports: []
    networks:
      default:
      trading-edge:
        aliases:
          - paper-frontend

  bot-runner:
    build:
      context: .
      dockerfile: services/bot_runner/Dockerfile
    env_file:
      - ${ENV_FILE}
    environment:
      BOT_RUNNER_POLL_SECONDS: 5
      BOT_RUNNER_GRACE_SECONDS: 20
      BOT_RUNNER_RESTART_BACKOFF_SECONDS: 15
      BOT_VERSION: 2026-02-25_a_paper
    depends_on:
      - db
    restart: unless-stopped

  automation-runner:
    env_file:
      - .env.paper
    networks:
      - default
      - trading-edge

  bot-runner-orchestrator:
    build:
      context: .
      dockerfile: services/bot_runner_orchestrator/Dockerfile
    env_file:
      - ${ENV_FILE}
    environment:
      ORC_POLL_SECONDS: 10
      ORC_ACTIONS_ENABLED: ${ORC_ACTIONS_ENABLED:-false}
      BOT_VERSION: 2026-02-26_a__paper
    depends_on:
      - db
    restart: unless-stopped

  regime-worker:
    environment:
      BOT_VERSION: 2026-01-26_a_paper

networks:
  trading-edge:
    name: trading-edge
    external: true