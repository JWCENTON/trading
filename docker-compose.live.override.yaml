services:
  db:
    ports: []

  api:
    ports:
      - "8001:8000"

  frontend:
    ports:
      - "3001:80"

  bot-runner:
    build:
      context: .
      dockerfile: services/bot_runner/Dockerfile
    env_file:
      - ${ENV_FILE}
    environment:
      BOT_RUNNER_POLL_SECONDS: 5
      BOT_RUNNER_GRACE_SECONDS: 20
      BOT_RUNNER_RESTART_BACKOFF_SECONDS: 15
      BOT_VERSION: 2026-01-14a
    depends_on:
      - db
    restart: unless-stopped

  automation-runner:
    env_file:
      - .env.live

  bot-runner-orchestrator:
    build:
      context: .
      dockerfile: services/bot_runner_orchestrator/Dockerfile
    env_file:
      - ${ENV_FILE}
    environment:
      ORC_POLL_SECONDS: 10
      ORC_ACTIONS_ENABLED: ${ORC_ACTIONS_ENABLED:-false}
      BOT_VERSION: 2026-01-15_orc_v1_live
    depends_on:
      - db
    restart: unless-stopped