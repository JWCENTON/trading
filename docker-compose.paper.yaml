services:
  db:
    image: postgres:16
    container_name: trading-db
    restart: always
    env_file: .env.paper
    environment:
      POSTGRES_USER: botuser
      POSTGRES_PASSWORD: botpass
      POSTGRES_DB: trading_paper
    volumes:
      - ./db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  bot-btc:
    build:
      context: .
      dockerfile: bot/Dockerfile
    container_name: trading-bot-worker-btc
    restart: always
    depends_on:
      - db
    env_file: .env.paper
    environment:
      SYMBOL: "BTCUSDT"
      STRATEGY_NAME: "RSI"
      REGIME_MODE: "ENFORCE"
      INTERVAL: "1m"
      RSI_OVERSOLD: "18"
      RSI_OVERBOUGHT: "82"
      TREND_BUFFER: "0.001"
      STOP_LOSS_PCT: "0.8"
      TAKE_PROFIT_PCT: "1.8"
      MAX_POSITION_MINUTES: "60"
      DAILY_MAX_LOSS_PCT: "0.5"
      DISABLE_HOURS: "7,17"
      PAPER_START_USDT: "100"
      QUOTE_ASSET: USDT
      DEFAULT_SYMBOL: BTCUSDT

  bot-eth:
    build: 
      context: .
      dockerfile: bot/Dockerfile
    container_name: trading-bot-worker-eth
    restart: always
    depends_on:
      - db
    env_file: .env.paper
